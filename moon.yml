language: 'go'
layer: 'application'
stack: 'backend'

project:
  title: 'template-go-api'
  description: 'Meigma Go web API server template.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

toolchains:
  default: 'go'

fileGroups:
  goSources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
    - 'go.mod'
    - 'go.sum'
  # Inputs that drive sqlc code generation: the config plus the SQL schema
  # (goose migrations, which sqlc reads as its schema) and hand-written queries.
  sqlcSources:
    - 'sqlc.yaml'
    - 'internal/adapter/postgres/migrations/*.sql'
    - 'internal/todo/postgres/queries/*.sql'
    - '.prototools'
    - '.moon/proto/sqlc.toml'
  # Inputs that drive mockery code generation: the config plus the source files
  # declaring the mocked interfaces (the outbound ports).
  mockerySources:
    - '.mockery.yaml'
    - 'internal/todo/ports.go'
    - 'internal/authz/authn.go'
    - 'internal/authz/contribution.go'
    - 'internal/authz/apikey/apikey.go'
    - '.prototools'
    - '.moon/proto/mockery.toml'
  lintConfig:
    - '.golangci.yml'
    - '.prototools'
    - '.moon/proto/golangci-lint.toml'
  releaseConfig:
    - '.goreleaser.yaml'
    - 'ghd.toml'
    - 'release-please-config.json'
    - '.release-please-manifest.json'
    - '.github/workflows/release*.yml'

workspace:
  inheritedTasks:
    include: []

tasks:
  format:
    command: 'proto run golangci-lint -- fmt --config .golangci.yml --diff'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  lint:
    command: 'proto run golangci-lint -- run --config .golangci.yml ./... --show-stats=false'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  build:
    command: 'go build -o bin/template-go-api ./cmd/template-go-api'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
    outputs:
      - 'bin/template-go-api'

  test:
    command: 'go test ./...'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
    options:
      cache: false

  # Regenerate the committed OpenAPI spec from the server code. Run after
  # changing the API; docs:build renders the committed result.
  openapi:
    command: 'go run ./cmd/template-go-api openapi --output docs/docs/openapi.yaml'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
    outputs:
      - 'docs/docs/openapi.yaml'

  # Drift-guard: regenerate to a temp file and fail if it differs from the
  # committed spec, so the spec can never fall out of sync with the code. Writes
  # no tracked file, so it never races docs:build reading the committed spec.
  openapi-check:
    script: 'tmp="$(mktemp)" && go run ./cmd/template-go-api openapi --output "$tmp" && git diff --no-index --exit-code -- docs/docs/openapi.yaml "$tmp"'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - 'docs/docs/openapi.yaml'
    options:
      cache: false

  # Supply-chain guard: verify the resolved sqlc binary against the repository's
  # pinned per-platform digest (.moon/proto/sqlc.sha256) BEFORE any sqlc task runs.
  # sqlc publishes no upstream checksum or signature, so its Proto plugin cannot
  # use checksum-url the way goose/mockery/golangci-lint do; this is the
  # repo-provided expected digest, checked before execution (CWE-494). It installs
  # and locates the binary WITHOUT executing sqlc, and fails closed on a platform
  # that has no pinned digest.
  sqlc-verify:
    script: |
      set -eu
      proto install sqlc >/dev/null
      bin="$(proto bin sqlc)"
      case "$(uname -s)" in
        Darwin) os=darwin ;;
        Linux)  os=linux ;;
        *) echo "sqlc-verify: unsupported OS '$(uname -s)'; add its sqlc digest to .moon/proto/sqlc.sha256" >&2; exit 1 ;;
      esac
      case "$(uname -m)" in
        arm64|aarch64) arch=arm64 ;;
        x86_64|amd64)  arch=amd64 ;;
        *) echo "sqlc-verify: unsupported arch '$(uname -m)'; add its sqlc digest to .moon/proto/sqlc.sha256" >&2; exit 1 ;;
      esac
      want="$(awk -v k="${os}_${arch}" '$1==k {print $2}' .moon/proto/sqlc.sha256)"
      [ -n "$want" ] || { echo "sqlc-verify: no pinned digest for ${os}_${arch} in .moon/proto/sqlc.sha256" >&2; exit 1; }
      if command -v sha256sum >/dev/null 2>&1; then
        got="$(sha256sum "$bin" | cut -d' ' -f1)"
      else
        got="$(shasum -a 256 "$bin" | cut -d' ' -f1)"
      fi
      if [ "$got" != "$want" ]; then
        echo "sqlc-verify: sqlc binary digest mismatch for ${os}_${arch}" >&2
        echo "  expected $want" >&2
        echo "  got      $got" >&2
        echo "  (binary: $bin)" >&2
        exit 1
      fi
      echo "sqlc-verify: sqlc binary verified for ${os}_${arch}"
    toolchains: ['go']
    inputs:
      - '.prototools'
      - '.moon/proto/sqlc.toml'
      - '.moon/proto/sqlc.sha256'
    options:
      cache: false

  # Regenerate the committed sqlc layer from the schema and queries. Run after
  # changing migrations/*.sql or queries/*.sql, then commit the result.
  sqlc:
    command: 'proto run sqlc -- generate'
    toolchains: ['go']
    deps:
      - 'root:sqlc-verify'
    inputs:
      - '@group(sqlcSources)'
    outputs:
      - 'internal/todo/postgres/sqlc/*.go'
    options:
      cache: false

  # Drift-guard: regenerate into a throwaway directory and fail if it differs
  # from the committed sqlc package, so the generated code can never fall out of
  # sync with the schema/queries. sqlc resolves `out` relative to the config
  # directory, so the temp dir lives under the repo root and is cleaned up on
  # exit. Writes no tracked file.
  sqlc-check:
    script: |
      set -eu
      tmp="$(mktemp -d "${PWD}/.sqlc-check.XXXXXX")"
      cfg="${tmp}.yaml"
      trap 'rm -rf "$tmp" "$cfg"' EXIT
      sed "s|out: internal/todo/postgres/sqlc|out: ${tmp#"${PWD}/"}|" sqlc.yaml > "$cfg"
      proto run sqlc -- generate -f "$cfg"
      git diff --no-index --exit-code -- internal/todo/postgres/sqlc "$tmp"
    toolchains: ['go']
    deps:
      - 'root:sqlc-verify'
    inputs:
      - '@group(sqlcSources)'
      - 'internal/todo/postgres/sqlc/*.go'
    options:
      cache: false

  # Regenerate the committed testify mocks from the outbound ports. Run after
  # changing a mocked interface, then commit the result.
  mockery:
    command: 'proto run mockery'
    toolchains: ['go']
    inputs:
      - '@group(mockerySources)'
    outputs:
      - 'internal/todo/mocks/*.go'
      - 'internal/authz/mocks/*.go'
      - 'internal/authz/apikey/mocks/*.go'
    options:
      cache: false

  # Drift-guard: regenerate the mocks into a throwaway directory and fail if they
  # differ from the committed package, so the generated code can never fall out of
  # sync with the interfaces. mockery resolves `dir` relative to the working
  # directory, so the temp dir lives under the repo root and is cleaned up on
  # exit. Writes no tracked file.
  mockery-check:
    script: |
      set -eu
      tmp="$(mktemp -d "${PWD}/.mockery-check.XXXXXX")"
      cfg="${tmp}.yaml"
      trap 'rm -rf "$tmp" "$cfg"' EXIT
      # Regenerate every mock into one throwaway directory (filenames are unique
      # across the mocked interfaces), then compare each committed mocks package
      # against the freshly generated files of the same name.
      sed "s|dir: \"{{.InterfaceDir}}/mocks\"|dir: ${tmp#"${PWD}/"}|" .mockery.yaml > "$cfg"
      proto run mockery -- --config "$cfg"
      for dir in internal/todo/mocks internal/authz/mocks internal/authz/apikey/mocks; do
        for committed in "$dir"/*.go; do
          git diff --no-index --exit-code -- "$committed" "$tmp/$(basename "$committed")"
        done
      done
    toolchains: ['go']
    inputs:
      - '@group(mockerySources)'
      - 'internal/todo/mocks/*.go'
      - 'internal/authz/mocks/*.go'
      - 'internal/authz/apikey/mocks/*.go'
    options:
      cache: false

  # Run the container-backed integration suite (gated by the `integration` build
  # tag, so the default `test`/`check` stay hermetic). Requires a running Docker
  # daemon; testcontainers starts a throwaway Postgres per run. It runs in CI
  # (`runInCI: true`) on the Docker-capable `ubuntu-latest` runner, but stays out
  # of the hermetic `check` aggregate so a local `check` needs no Docker.
  test-integration:
    command: 'go test -tags integration ./internal/integration/...'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - 'internal/adapter/postgres/migrations/*.sql'
    options:
      cache: false
      runInCI: true

  # Run the embedded database migrations for local development. Pass the goose
  # verb and connection URL through, for example:
  #   moon run root:migrate -- up --database-url postgres://localhost:5432/app
  # Migrations are explicit and never run automatically by serve.
  migrate:
    command: 'go run ./cmd/template-go-api migrate'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - 'internal/adapter/postgres/migrations/*.sql'
    options:
      cache: false
      runInCI: false

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:test'
      - 'root:openapi-check'
      - 'root:sqlc-verify'
      - 'root:sqlc-check'
      - 'root:mockery-check'
      - 'docs:build'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
      - '@group(releaseConfig)'
    options:
      cache: false
      runInCI: true
