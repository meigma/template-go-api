language: 'go'
layer: 'application'
stack: 'backend'

project:
  title: 'template-go-api'
  description: 'Meigma Go web API server template.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

toolchains:
  default: 'go'

fileGroups:
  goSources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
    - 'go.mod'
    - 'go.sum'
  lintConfig:
    - '.golangci.yml'
    - '.prototools'
    - '.moon/proto/golangci-lint.toml'
  releaseConfig:
    - '.goreleaser.yaml'
    - 'ghd.toml'
    - 'release-please-config.json'
    - '.release-please-manifest.json'
    - '.github/workflows.disabled/**/*.yml'

workspace:
  inheritedTasks:
    include: []

tasks:
  format:
    command: 'proto run golangci-lint -- fmt --config .golangci.yml --diff'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  lint:
    command: 'proto run golangci-lint -- run --config .golangci.yml ./... --show-stats=false'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
    options:
      cache: false

  build:
    command: 'go build -o bin/template-go-api ./cmd/template-go-api'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
    outputs:
      - 'bin/template-go-api'

  test:
    command: 'go test ./...'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
    options:
      cache: false

  # Regenerate the committed OpenAPI spec from the server code. Run after
  # changing the API; docs:build renders the committed result.
  openapi:
    command: 'go run ./cmd/template-go-api openapi --output docs/docs/openapi.yaml'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
    outputs:
      - 'docs/docs/openapi.yaml'

  # Drift-guard: regenerate to a temp file and fail if it differs from the
  # committed spec, so the spec can never fall out of sync with the code. Writes
  # no tracked file, so it never races docs:build reading the committed spec.
  openapi-check:
    script: 'tmp="$(mktemp)" && go run ./cmd/template-go-api openapi --output "$tmp" && git diff --no-index --exit-code -- docs/docs/openapi.yaml "$tmp"'
    toolchains: ['go']
    inputs:
      - '@group(goSources)'
      - 'docs/docs/openapi.yaml'
    options:
      cache: false

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:test'
      - 'root:openapi-check'
      - 'docs:build'
    inputs:
      - '@group(goSources)'
      - '@group(lintConfig)'
      - '@group(releaseConfig)'
    options:
      cache: false
      runInCI: true
