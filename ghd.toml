version = 1

[provenance]
signer_workflow = "meigma/template-go-api/.github/workflows/release.yml"

[[packages]]
name = "template-go-api"
description = "Meigma Go web API server template."
tag_pattern = "v${version}"

[[packages.assets]]
os = "darwin"
arch = "amd64"
pattern = "template-go-api_${version}_darwin_amd64"

[[packages.assets]]
os = "darwin"
arch = "arm64"
pattern = "template-go-api_${version}_darwin_arm64"

[[packages.assets]]
os = "linux"
arch = "amd64"
pattern = "template-go-api_${version}_linux_amd64"

[[packages.assets]]
os = "linux"
arch = "arm64"
pattern = "template-go-api_${version}_linux_arm64"

[[packages.binaries]]
path = "template-go-api"
