name = "goose"
type = "cli"

# goose publishes raw (un-archived) binaries per platform.
[platform.macos]
download-file = "goose_darwin_{arch}"

[platform.linux]
download-file = "goose_linux_{arch}"

[platform.windows]
download-file = "goose_windows_{arch}.exe"

[install]
download-url = "https://github.com/pressly/goose/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/pressly/goose/releases/download/v{version}/checksums.txt"

[install.arch]
aarch64 = "arm64"
x86_64 = "x86_64"

[resolve]
git-url = "https://github.com/pressly/goose"
