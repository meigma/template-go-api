site_name: template-go-api
site_description: Meigma Go web API server template
site_url: https://meigma.github.io/template-go-api/
repo_name: meigma/template-go-api
repo_url: https://github.com/meigma/template-go-api
edit_uri: edit/master/docs/docs/
docs_dir: docs
site_dir: build
strict: true

theme:
  name: material
  language: en
  features:
    - content.action.edit
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - API Reference: api.md

plugins:
  - search
  # Renders docs/openapi.yaml into the API Reference page via the [OAD(...)] directive.
  - neoteroi.mkdocsoad:
      use_pymdownx: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/palette.css
  # Vendored from the neoteroi-mkdocs v1.2.0 release (css-v1.2.0.css); the wheel
  # does not ship it. Re-pull the matching asset when bumping neoteroi-mkdocs.
  - stylesheets/mkdocsoad.css
