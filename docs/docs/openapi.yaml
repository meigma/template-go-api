components:
  schemas:
    CreateTodoInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/CreateTodoInputBody.json
          format: uri
          readOnly: true
          type: string
        title:
          description: Human-readable title of the todo.
          maxLength: 200
          minLength: 1
          type: string
      required:
        - title
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          example: Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          nullable: true
          type: array
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          example: https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          example: 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          example: Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          example: https://example.com/errors/example
          format: uri
          type: string
      type: object
    ListTodosOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/ListTodosOutputBody.json
          format: uri
          readOnly: true
          type: string
        nextCursor:
          description: Opaque cursor for the next page; omitted when this is the last page.
          type: string
        todos:
          description: The page of todos, oldest first.
          items:
            $ref: "#/components/schemas/TodoDTO"
          nullable: true
          type: array
      required:
        - todos
      type: object
    TodoDTO:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          example: https://example.com/schemas/TodoDTO.json
          format: uri
          readOnly: true
          type: string
        completedAt:
          description: When the todo was completed, if set.
          format: date-time
          type: string
        createdAt:
          description: When the todo was created.
          format: date-time
          type: string
        id:
          description: Unique identifier of the todo.
          type: string
        status:
          description: Lifecycle state of the todo.
          enum:
            - open
            - completed
          type: string
        title:
          description: Human-readable title of the todo.
          type: string
      required:
        - id
        - title
        - status
        - createdAt
      type: object
  securitySchemes:
    apiKey:
      description: "API key supplied via the X-API-Key header or an Authorization: Bearer credential."
      in: header
      name: X-API-Key
      type: apiKey
info:
  title: template-go-api
  version: dev
openapi: 3.0.3
paths:
  /todos:
    get:
      operationId: list-todos
      parameters:
        - description: Maximum number of todos to return per page.
          explode: false
          in: query
          name: limit
          schema:
            default: 20
            description: Maximum number of todos to return per page.
            format: int64
            maximum: 100
            minimum: 1
            type: integer
        - description: Opaque pagination cursor copied from a previous response's nextCursor; omit for the first page.
          explode: false
          in: query
          name: cursor
          schema:
            description: Opaque pagination cursor copied from a previous response's nextCursor; omit for the first page.
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListTodosOutputBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - apiKey: []
      summary: List todos
      tags:
        - Todos
    post:
      operationId: create-todo
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTodoInputBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoDTO"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      security:
        - apiKey: []
      summary: Create a todo
      tags:
        - Todos
  /todos/{id}:
    get:
      operationId: get-todo
      parameters:
        - description: Unique identifier of the todo.
          in: path
          name: id
          required: true
          schema:
            description: Unique identifier of the todo.
            maxLength: 64
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoDTO"
          description: OK
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      security:
        - apiKey: []
      summary: Get a todo by id
      tags:
        - Todos
  /todos/{id}/complete:
    post:
      operationId: complete-todo
      parameters:
        - description: Unique identifier of the todo.
          in: path
          name: id
          required: true
          schema:
            description: Unique identifier of the todo.
            maxLength: 64
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodoDTO"
          description: OK
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      security:
        - apiKey: []
      summary: Mark a todo as completed
      tags:
        - Todos
