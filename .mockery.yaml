# mockery configuration for generating testify mocks of the outbound ports.
#
# Mocks are generated with the testify template (stretchr/testify/mock under the
# hood) and committed beside their domain in a `mocks` subpackage — e.g. the
# todo.Repository port mocks to internal/todo/mocks (package mocks, type
# mocks.Repository, constructor mocks.NewRepository(t)). The mockery-check moon
# task guards the committed output against drift.
#
# Add a port by listing its package and interface below, then run
# `moon run mockery` and commit the result.
all: false
template: testify
dir: "{{.InterfaceDir}}/mocks"
filename: "mock_{{.InterfaceName}}.go"
pkgname: "mocks"
structname: "{{.InterfaceName}}"
force-file-write: true
packages:
  github.com/meigma/template-go-api/internal/todo:
    interfaces:
      Repository:
